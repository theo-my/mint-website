<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MINT Lab — Machine Intelligence and Normative Theory</title>
  <meta name="description" content="MINT Lab develops philosophical foundations for AI governance and safety. Founded at the Australian National University, now at Johns Hopkins University.">
  <meta property="og:title" content="MINT Lab — Machine Intelligence and Normative Theory">
  <meta property="og:description" content="Philosophical foundations for AI governance and safety.">
  <meta property="og:image" content="assets/logos/minty-rgb-standard.png">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="assets/logos/favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================================================
       NAVIGATION
       ============================================================ -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="scroll-progress" id="scroll-progress"></div>
    <div class="nav-inner">
      <a href="#" class="nav-brand" aria-label="MINT Lab home">
        <img src="assets/minties/minty-squid.png" alt="" aria-hidden="true">
        <span>MINT Lab</span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#research">Research</a></li>
        <li><a href="#news">News</a></li>
        <li><a href="#people">People</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- ============================================================
       HERO
       ============================================================ -->
  <section class="hero" id="hero">
    <div class="container">
      <img src="assets/logos/minty-rgb-standard.png" alt="MINT Lab — Minty the squid mascot with wordmark" class="hero-logo">
      <p class="hero-tagline" id="hero-tagline"></p>
      <p class="hero-institution" id="hero-institution"></p>
      <p class="wip-notice">This site is a work-in-progress. All text is just placeholder text.</p>
    </div>
  </section>

  <!-- ============================================================
       ABOUT
       ============================================================ -->
  <section class="bg-off-white" id="about">
    <div class="container">
      <p class="section-label">About</p>
      <h2>The Lab</h2>
      <div class="about-content" id="about-content"></div>
    </div>
  </section>

  <!-- ============================================================
       RESEARCH PROJECTS
       ============================================================ -->
  <section id="research">
    <div class="container">
      <p class="section-label">Research</p>
      <h2>Current Projects</h2>
      <div class="projects-grid" id="projects-grid"></div>
    </div>
  </section>

  <!-- ============================================================
       FEED (Publications / Events / News)
       ============================================================ -->
  <section class="bg-off-white" id="news">
    <div class="container">
      <p class="section-label">News</p>
      <h2>Publications, Events &amp; News</h2>
      <div class="feed-filters" id="feed-filters"></div>
      <ul class="feed-list" id="feed-list"></ul>
      <button class="feed-show-more" id="feed-show-more">Show all</button>
    </div>
  </section>

  <!-- ============================================================
       PEOPLE
       ============================================================ -->
  <section id="people">
    <div class="container">
      <p class="section-label">People</p>
      <h2>Our Team</h2>
      <div id="people-container"></div>
    </div>
  </section>

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer class="site-footer" id="contact">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-contact">
          <p class="footer-heading">Contact</p>
          <p>Email: <a id="footer-email" href=""></a></p>
          <ul class="footer-social-links" id="footer-social"></ul>
        </div>
        <div>
          <p class="footer-heading">Credits</p>
          <p id="footer-credits"></p>
        </div>
      </div>
      <div class="footer-acknowledgment" id="footer-acknowledgment"></div>
      <div class="footer-bottom">
        <span>&copy; MINT Lab</span>
        <img src="assets/minties/minty-reading.png" alt="Minty reading" class="footer-minty">
      </div>
    </div>
  </footer>

  <!-- ============================================================
       DATA + SCRIPTS
       ============================================================ -->
  <script src="site-data.js"></script>
  <script>
    (function () {
      'use strict';

      // ---- Helpers ----

      function $(selector) { return document.querySelector(selector); }
      function $$(selector) { return document.querySelectorAll(selector); }
      function el(tag, attrs, children) {
        var node = document.createElement(tag);
        if (attrs) Object.keys(attrs).forEach(function (k) {
          if (k === 'text') { node.textContent = attrs[k]; }
          else if (k === 'html') { node.innerHTML = attrs[k]; }
          else if (k === 'className') { node.className = attrs[k]; }
          else if (k.startsWith('on')) { node.addEventListener(k.slice(2).toLowerCase(), attrs[k]); }
          else { node.setAttribute(k, attrs[k]); }
        });
        if (children) children.forEach(function (c) {
          if (typeof c === 'string') node.appendChild(document.createTextNode(c));
          else if (c) node.appendChild(c);
        });
        return node;
      }


      // ---- Navigation ----

      var hamburger = $('#nav-hamburger');
      var navLinks = $('#nav-links');

      hamburger.addEventListener('click', function () {
        var isOpen = navLinks.classList.toggle('open');
        hamburger.classList.toggle('open');
        hamburger.setAttribute('aria-expanded', isOpen);
      });

      // Scroll progress bar
      var progressBar = $('#scroll-progress');
      window.addEventListener('scroll', function () {
        var scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
        var scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        var progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
        progressBar.style.width = progress + '%';
      });

      // Close mobile nav when a link is clicked
      navLinks.addEventListener('click', function (e) {
        if (e.target.tagName === 'A') {
          navLinks.classList.remove('open');
          hamburger.classList.remove('open');
          hamburger.setAttribute('aria-expanded', 'false');
        }
      });


      // ---- Hero ----

      $('#hero-tagline').textContent = SITE_DATA.meta.tagline;
      $('#hero-institution').textContent = SITE_DATA.meta.institution;


      // ---- About ----

      var about = SITE_DATA.about;
      var aboutHtml = '<p>' + about.mission + '</p>' +
        '<p><span class="pi-name">' + about.pi.name + '</span> is ' +
        about.pi.title + ' at ' + about.pi.institution +
        ' and founding director of MINT Lab. ' + about.pi.bio.split('. ').slice(1).join('. ') + '</p>';
      $('#about-content').innerHTML = aboutHtml;


      // ---- Research Projects ----

      var projectsGrid = $('#projects-grid');
      SITE_DATA.projects.forEach(function (project) {
        var card = el('div', { className: 'project-card', id: 'project-' + project.id });
        var header = el('div', { className: 'project-header' }, [
          el('h3', {}, [
            el('span', { className: 'project-icon', text: project.icon }),
            document.createTextNode(project.title)
          ]),
          el('span', { className: 'project-toggle', text: '\u25BC' })
        ]);
        var summary = el('p', { className: 'project-summary', text: project.summary });
        var detail = el('div', { className: 'project-detail' }, [
          el('div', { className: 'project-detail-inner', text: project.description })
        ]);

        header.addEventListener('click', function () {
          var isExpanded = card.classList.toggle('expanded');
          if (isExpanded) {
            detail.style.maxHeight = detail.scrollHeight + 'px';
          } else {
            detail.style.maxHeight = '0';
          }
        });

        card.appendChild(header);
        card.appendChild(summary);
        card.appendChild(detail);
        projectsGrid.appendChild(card);
      });


      // ---- Feed ----

      var feedData = SITE_DATA.feed;
      var feedList = $('#feed-list');
      var feedFilters = $('#feed-filters');
      var feedShowMore = $('#feed-show-more');
      var currentFilter = 'all';
      var showAll = false;
      var INITIAL_COUNT = 8;

      var filterTypes = [
        { key: 'all', label: 'All' },
        { key: 'publication', label: 'Publications' },
        { key: 'event', label: 'Events' },
        { key: 'newsletter', label: 'Newsletter' },
        { key: 'news', label: 'News' }
      ];

      filterTypes.forEach(function (ft) {
        var btn = el('button', {
          className: 'feed-filter' + (ft.key === 'all' ? ' active' : ''),
          text: ft.label,
          'data-filter': ft.key,
        });
        btn.addEventListener('click', function () {
          currentFilter = ft.key;
          showAll = false;
          renderFeed();
          $$('.feed-filter').forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
        });
        feedFilters.appendChild(btn);
      });

      feedShowMore.addEventListener('click', function () {
        showAll = !showAll;
        renderFeed();
      });

      function renderFeed() {
        feedList.innerHTML = '';
        var filtered = currentFilter === 'all'
          ? feedData
          : feedData.filter(function (item) { return item.type === currentFilter; });

        var visible = showAll ? filtered : filtered.slice(0, INITIAL_COUNT);

        visible.forEach(function (item) {
          var titleContent;
          if (item.url) {
            titleContent = el('a', { href: item.url, text: item.title });
          } else {
            titleContent = document.createTextNode(item.title);
          }

          var meta = [];
          if (item.authors) meta.push(item.authors);
          if (item.description) meta.push(item.description);

          var li = el('li', { className: 'feed-item', 'data-type': item.type }, [
            el('span', { className: 'feed-date', text: item.date }),
            el('div', { className: 'feed-content' }, [
              el('h4', {}, [
                el('span', { className: 'feed-type-badge ' + item.type, text: item.type }),
                titleContent
              ]),
              meta.length ? el('p', { className: 'feed-meta', text: meta.join(' · ') }) : null
            ])
          ]);
          feedList.appendChild(li);
        });

        if (filtered.length <= INITIAL_COUNT) {
          feedShowMore.style.display = 'none';
        } else {
          feedShowMore.style.display = 'inline-block';
          feedShowMore.textContent = showAll ? 'Show less' : 'Show all (' + filtered.length + ')';
        }
      }

      renderFeed();


      // ---- People ----

      var peopleContainer = $('#people-container');
      var groups = [
        { key: 'team', label: 'Team', defaultOpen: true },
        { key: 'affiliates', label: 'Affiliates', defaultOpen: false },
        { key: 'alumni', label: 'Alumni', defaultOpen: false }
      ];

      groups.forEach(function (group) {
        var people = SITE_DATA.people[group.key];
        if (!people || !people.length) return;

        var groupDiv = el('div', { className: 'people-group' + (group.defaultOpen ? ' expanded' : '') });

        var headerEl = el('div', { className: 'people-group-header' }, [
          el('h3', {}, [
            document.createTextNode(group.label),
            el('span', { className: 'people-count', text: '(' + people.length + ')' })
          ]),
          el('span', { className: 'people-toggle', text: '\u25BC' })
        ]);

        var grid = el('div', { className: 'people-grid' });
        if (group.defaultOpen) {
          grid.style.maxHeight = 'none';
        }

        people.forEach(function (person) {
          // Avatar: use photo if available, otherwise initials on a colored circle
          var avatar = el('div', { className: 'person-avatar' });
          if (person.photo) {
            avatar.appendChild(el('img', { src: person.photo, alt: person.name }));
          } else {
            var initials = person.name.replace(/\(.*?\)/g, '').trim().split(/\s+/).map(function(w) { return w[0]; }).join('').slice(0, 2);
            avatar.textContent = initials;
            // Stable color from name hash
            var hash = 0;
            for (var i = 0; i < person.name.length; i++) hash = person.name.charCodeAt(i) + ((hash << 5) - hash);
            var hue = ((hash % 360) + 360) % 360;
            avatar.style.background = 'hsl(' + hue + ', 45%, 45%)';
          }

          // Links: render from person.links if present
          // Each link: { abbr: "Web"|"LI"|"PP"|"GS", url: "https://..." }
          var linkLabels = { Web: 'Personal website', LI: 'LinkedIn', PP: 'PhilPeople', GS: 'Google Scholar' };
          var linksEl = null;
          if (person.links && person.links.length) {
            linksEl = el('div', { className: 'person-links' });
            person.links.forEach(function (link) {
              var a = el('a', { text: link.abbr });
              a.href = link.url;
              a.title = linkLabels[link.abbr] || link.abbr;
              a.target = '_blank';
              a.rel = 'noopener';
              linksEl.appendChild(a);
            });
          }

          var header = el('div', { className: 'person-card-header' }, [
            avatar,
            el('div', { className: 'person-card-info' }, [
              el('div', { className: 'person-name', text: person.name }),
              el('div', { className: 'person-role', text: person.role }),
              person.discipline ? el('div', { className: 'person-discipline', text: person.discipline }) : null
            ]),
            linksEl
          ]);

          var article = /^[aeiou]/i.test(person.role) ? 'an' : 'a';
          var bioText = person.bio || person.name + ' is ' + article + ' ' + person.role + ' at the MINT Lab. Their research engages with questions at the intersection of technology, ethics, and society. This is a placeholder bio\u200A\u2014\u200Aan updated version will be available soon.';
          var bio = el('div', { className: 'person-bio' }, [
            el('p', { text: bioText })
          ]);

          var card = el('div', { className: 'person-card' }, [header, bio]);

          card.addEventListener('click', function (e) {
            if (e.target.closest('a')) return; // Don't toggle when clicking a link
            var isExpanded = card.classList.toggle('expanded');
            if (isExpanded) {
              bio.style.maxHeight = bio.scrollHeight + 'px';
            } else {
              bio.style.maxHeight = '0';
            }
          });

          grid.appendChild(card);
        });

        headerEl.addEventListener('click', function () {
          var isExpanded = groupDiv.classList.toggle('expanded');
          if (isExpanded) {
            grid.style.maxHeight = grid.scrollHeight + 'px';
            // After expand transition, switch to none so bio toggles flow naturally
            grid.addEventListener('transitionend', function handler() {
              grid.removeEventListener('transitionend', handler);
              if (groupDiv.classList.contains('expanded')) {
                grid.style.maxHeight = 'none';
              }
            }, { once: true });
          } else {
            // Reset any expanded bios before collapsing
            grid.querySelectorAll('.person-card.expanded').forEach(function (c) {
              c.classList.remove('expanded');
              c.querySelector('.person-bio').style.maxHeight = '0';
            });
            // Set explicit height first so transition works
            grid.style.maxHeight = grid.scrollHeight + 'px';
            // Force reflow
            grid.offsetHeight;
            grid.style.maxHeight = '0';
          }
        });

        groupDiv.appendChild(headerEl);
        groupDiv.appendChild(grid);
        peopleContainer.appendChild(groupDiv);
      });


      // ---- Footer ----

      var meta = SITE_DATA.meta;
      var footer = SITE_DATA.footer;

      var emailLink = $('#footer-email');
      emailLink.href = 'mailto:' + meta.contactEmail;
      emailLink.textContent = meta.contactEmail;

      var socialList = $('#footer-social');
      if (meta.twitter) {
        socialList.appendChild(el('li', {}, [
          el('a', { href: meta.twitter, text: 'Twitter / X', target: '_blank', rel: 'noopener' })
        ]));
      }
      if (meta.substackSeth) {
        socialList.appendChild(el('li', {}, [
          el('a', { href: meta.substackSeth, text: 'Seth Lazar (Substack)', target: '_blank', rel: 'noopener' })
        ]));
      }
      if (meta.substackNewsletter) {
        socialList.appendChild(el('li', {}, [
          el('a', { href: meta.substackNewsletter, text: 'Newsletter (Substack)', target: '_blank', rel: 'noopener' })
        ]));
      }

      $('#footer-credits').innerHTML = footer.credits.mascot + '<br>' + footer.credits.site;
      $('#footer-acknowledgment').textContent = footer.acknowledgment;

    })();
  </script>

</body>
</html>
